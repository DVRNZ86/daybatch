<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light only">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daybatch</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#EDF1F6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daybatch">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="48x48" href="icons/favicon-48.png">
<link rel="stylesheet" href="src/styles.css">
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="logo">DAYBATCH<b>.</b></div>
    <span id="hdr-streak" class="hide"></span>
    <div class="ver">v0.B4.3 · 5 GAMES</div>
  </div>
  <div id="rollover" class="hide">
    <span>New batch is ready 🌅</span>
    <button id="rollover-go">Start today's batch</button>
  </div>
  <div id="installhint" class="hide">
    <span id="installhint-text">Add Daybatch to your home screen 🌅</span>
    <button id="installhint-add" class="hide">Add</button>
    <button id="installhint-x">Dismiss</button>
  </div>
  <div class="tabs">
    <button data-tab="tally">🧮 Tally</button>
    <button data-tab="crossing">🧭 Cross</button>
    <button data-tab="sonar" class="on">📡 Sonar</button>
    <button data-tab="codebreak">🔐 Code</button>
    <button data-tab="lexi">🔤 Lexi</button>
  </div>
  <div id="pane-tally" class="hide"></div>
  <div id="pane-crossing" class="hide"></div>
  <div id="pane-sonar"></div>
  <div id="pane-codebreak" class="hide"></div>
  <div id="pane-lexi" class="hide"></div>
  <div id="report-host"></div>
</div>

<div id="helpov">
  <div id="helpbox">
    <div id="h-title">How to play</div>
    <div id="h-body"></div>
    <button class="btn pri" style="width:100%;margin-top:12px" id="h-close">Got it</button>
    <button id="h-install" class="hide">Add to home screen 🌅</button>
  </div>
</div>

<div id="overlay">
  <div id="modal">
    <div id="m-title"></div>
    <div id="m-line"></div>
    <pre id="m-share"></pre>
    <div class="btnrow">
      <button class="btn pri" id="m-copy">Share</button>
      <button class="btn" id="m-again">Play another</button>
    </div>
    <button id="m-close">View board</button>
  </div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>

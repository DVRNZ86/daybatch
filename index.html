<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light only">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daybatch</title>
<style>
  :root {
    --paper:#EDF1F6; --card:#fff; --grid:#D8E1EB; --ink:#16324F; --faded:#7A8CA3;
    --marker:#FF5714; --markerSoft:#FFD9C4; --win:#0FB360; --winSoft:#D6F5E5; --blue:#2E86FF;
    --amber:#F5A800; --bad:#E5484D; --badSoft:#FDE0E1; --goal:#DBEAFE;
  }
  :root { color-scheme: light only; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    margin:0; min-height:100vh; background:var(--paper);
    background-image:linear-gradient(#D8E1EB44 1px,transparent 1px),linear-gradient(90deg,#D8E1EB44 1px,transparent 1px);
    background-size:28px 28px;
    font-family:'Space Grotesk',system-ui,-apple-system,sans-serif; color:var(--ink);
    display:flex; justify-content:center; padding:10px 10px 24px;
  }
  .mono { font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace; }
  #app { width:100%; max-width:420px; }
  .hdr { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px; background:var(--card); border:1px solid var(--grid); border-radius:12px; padding:7px 12px; }
  .logo { font-weight:700; font-size:20px; letter-spacing:.06em; color:#0B1F33; }
  .logo b { color:var(--marker); }
  .ver { font-family:ui-monospace,monospace; font-size:11px; font-weight:600; color:#3E5470; letter-spacing:.1em; }
  .tabs { display:flex; gap:5px; margin-bottom:8px; }
  .tabs button {
    flex:1; padding:8px 2px; border-radius:12px; font-size:11px; font-weight:600;
    font-family:inherit; cursor:pointer; border:1px solid var(--grid); background:var(--card); color:var(--ink);
  }
  .tabs button.on { border:none; background:linear-gradient(135deg,var(--marker),#FF8A3D); color:#fff; }
  .rules {
    font-size:13px; color:var(--faded); margin-bottom:12px; line-height:1.5;
    background:var(--card); border:1px solid var(--grid); border-radius:13px; padding:10px 12px;
  }
  .rules b { color:var(--ink); }
  .stats { display:flex; gap:6px; margin-bottom:8px; align-items:stretch; }
  .stat { flex:1; background:var(--card); border-radius:12px; border:1px solid var(--grid); padding:5px 4px; text-align:center; }
  .stat.big { flex:2; }
  .stat .lb { font-size:9px; letter-spacing:.14em; color:var(--faded); font-weight:600; }
  .stat .vl { font-family:ui-monospace,monospace; font-weight:600; font-size:15px; line-height:1.25; }
  .stat.big .vl { font-size:20px; }
  .board {
    background:var(--card); border:1px solid var(--grid); border-radius:16px; padding:8px;
    box-shadow:0 4px 20px rgba(22,50,79,.08);
  }
  .btnrow { display:flex; gap:6px; margin-top:8px; }
  .btn {
    flex:1; padding:10px 6px; border-radius:12px; font-size:13px; font-weight:600;
    font-family:inherit; cursor:pointer; border:1px solid var(--grid); background:var(--card); color:var(--ink);
    touch-action:manipulation;
  }
  .btn.pri { border:none; background:var(--ink); color:#fff; }
  .btn:active { transform:scale(.97); }
  .btn:disabled { opacity:.4; }
  /* legend */
  .legend { display:flex; gap:10px; margin-top:8px; }
  .legend > div { flex:1; text-align:center; font-size:11px; }
  .legend .mini { display:grid; grid-template-columns:repeat(3,22px); gap:2px; justify-content:center; margin-bottom:4px; }
  .legend .mini span { width:22px; height:22px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:11px; }
  /* crossing */
  #cr-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; max-width:315px; margin:0 auto; }
  #cr-grid button {
    aspect-ratio:1; border-radius:11px; border:1px solid var(--grid); background:#F6F8FB;
    font-family:ui-monospace,monospace; font-weight:600; font-size:17px; color:var(--ink);
    display:flex; align-items:center; justify-content:center; position:relative; padding:0;
    transition:background .15s; cursor:default; touch-action:manipulation;
  }
  #cr-grid button.goal { background:var(--goal); }
  #cr-grid button.seen { background:#FDFEFE; }
  #cr-grid button.pos { background:var(--markerSoft); outline:3px solid var(--marker); outline-offset:-3px; }
  #cr-grid button.boom { background:var(--badSoft); }
  #cr-grid button.can { border:2px dashed #FF6B2C99; cursor:pointer; }
  #cr-grid .tag { position:absolute; font-size:8px; font-weight:700; letter-spacing:.12em; color:var(--marker); }
  #cr-grid .flag { position:absolute; font-size:11px; opacity:.55; }
  /* sonar */
  .sn-row { display:grid; grid-template-columns:22px repeat(7,1fr); gap:3px; margin-bottom:3px; }
  .sn-edge { display:flex; align-items:center; justify-content:center; font-family:ui-monospace,monospace; font-weight:700; font-size:16px; }
  .sn-edge.done { color:var(--win); opacity:.65; }
  .sn-row button {
    aspect-ratio:1; border-radius:10px; border:1px solid var(--grid); background:#F6F8FB;
    font-size:17px; padding:0; display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:700; cursor:pointer; transition:background .18s; touch-action:manipulation;
  }
  .sn-row button.hit { background:linear-gradient(135deg,var(--marker),#FF8A3D); box-shadow:0 2px 8px #FF571455; }
  .sn-row button.miss { background:#E2ECF9; color:var(--blue); cursor:default; }
  .sn-row button.ship { background:var(--markerSoft); }
  /* codebreak */
  .cb-rows { min-height:60px; max-height:33vh; overflow-y:auto; }
  .cb-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .cb-num { font-family:ui-monospace,monospace; font-size:11px; color:var(--faded); width:14px; }
  .cb-tiles { display:flex; gap:6px; }
  .cb-tile { width:37px; height:37px; padding:1px; }
  .cb-slot {
    width:37px; height:37px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    font-size:18px; background:#fff; border:2px dashed #FF571455; color:var(--faded); cursor:pointer;
  }
  .cb-slot.filled { background:#F6F8FB; border-color:var(--grid); }
  .cb-keys { display:flex; gap:5px; margin-top:8px; justify-content:center; }
  .cb-keys button {
    flex:1; max-width:46px; border:none; background:transparent; cursor:pointer; padding:0; touch-action:manipulation;
  }
  .cb-keys button .shp { aspect-ratio:1; }
  .cb-keys button.used .shp { opacity:.3; }
  .cb-keys button.dead .shp { background:#DEE6F0!important; opacity:.45; }
  .cb-keys button.kgreen .kdot { background:var(--win); }
  .cb-keys button.kamber .kdot { background:var(--amber); }
  /* tally */
  #ty-board { position:relative; touch-action:none; user-select:none; -webkit-user-select:none; }
  #ty-grid { display:grid; grid-template-columns:repeat(5,1fr); }
  #ty-grid .tc {
    aspect-ratio:1; display:flex; align-items:center; justify-content:center; position:relative;
    box-shadow:inset 0 0 0 .5px var(--grid); font-family:ui-monospace,monospace; font-weight:600;
    transition:background .12s;
  }
  #ty-grid .tc.num { font-size:26px; color:var(--ink); }
  #ty-grid .tc.op { font-size:22px; color:var(--faded); }
  #ty-grid .tc.on { background:var(--markerSoft); }
  #ty-grid .tc .tag { position:absolute; bottom:1px; font-size:7px; font-weight:700; letter-spacing:.12em; color:var(--marker); background:rgba(255,255,255,.85); border-radius:4px; padding:1px 3px; }
  #ty-svg { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:1; }
  .shakeX { animation:shakeX .45s; }
  @keyframes shakeX { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
  /* help */
  .helpbtn {
    flex:none; width:38px; border-radius:12px; border:1px solid var(--grid); background:var(--card);
    font-weight:700; font-size:16px; color:var(--marker); cursor:pointer; font-family:inherit;
  }
  #helpov {
    position:fixed; inset:0; z-index:600; background:rgba(22,50,79,.5);
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  #helpov.show { display:flex; animation:fadeIn .2s ease-out; }
  #helpbox {
    background:var(--card); border-radius:20px; width:100%; max-width:340px; padding:18px;
    box-shadow:0 16px 48px rgba(22,50,79,.35); animation:popIn .25s ease-out;
  }
  #h-title { font-weight:700; font-size:18px; margin-bottom:8px; }
  #h-body { font-size:13px; color:var(--faded); line-height:1.55; }
  #h-body b { color:var(--ink); }
  /* sonar fleet */
  .fleet { display:flex; gap:14px; align-items:center; justify-content:center; padding:2px 0 6px; }
  .fleet .fl { font-size:10px; letter-spacing:.12em; color:var(--faded); font-weight:600; }
  .fleet .ship { display:flex; gap:2px; }
  .fleet .ship i { width:14px; height:14px; border-radius:4px; background:linear-gradient(135deg,var(--blue),#7C5CFF); box-shadow:inset 0 -2px 0 rgba(0,0,0,.15); }
  /* codebreak shapes */
  .shp { width:100%; height:100%; display:block; }
  .shp.cir { border-radius:50%; }
  .shp.sq { border-radius:7px; }
  .shp.tri { clip-path:polygon(50% 4%, 97% 94%, 3% 94%); }
  .shp.dia { clip-path:polygon(50% 2%, 98% 50%, 50% 98%, 2% 50%); }
  .shp.star { clip-path:polygon(50% 2%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
  .shp.pen { clip-path:polygon(50% 2%, 98% 38%, 79% 97%, 21% 97%, 2% 38%); }
  .shp.plus { clip-path:polygon(34% 2%, 66% 2%, 66% 34%, 98% 34%, 98% 66%, 66% 66%, 66% 98%, 34% 98%, 34% 66%, 2% 66%, 2% 34%, 34% 34%); }
  .kdot { width:16px; height:4px; border-radius:2px; background:transparent; display:block; margin:3px auto 0; }
  /* lexi */
  .lx-slots { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; padding:2px 0 6px; }
  .lx-word { display:flex; gap:2px; }
  .lx-word b {
    width:19px; height:22px; border-radius:5px; background:#EDF3F9; border:1px solid var(--grid);
    display:flex; align-items:center; justify-content:center; font-family:ui-monospace,monospace;
    font-size:13px; font-weight:700; color:var(--ink); text-transform:uppercase;
  }
  .lx-word.found b { background:var(--winSoft); border-color:var(--win); color:var(--win); }
  .lx-word.hinted b { background:var(--amberSoft, #FBF0D4); border-color:var(--amber); color:var(--amber); }
  #lx-preview {
    text-align:center; min-height:34px; font-family:ui-monospace,monospace; font-weight:700;
    font-size:24px; letter-spacing:.2em; color:var(--marker); text-transform:uppercase;
  }
  #lx-wheelwrap { position:relative; width:230px; height:230px; margin:0 auto; touch-action:none; user-select:none; -webkit-user-select:none; }
  #lx-wheelwrap .lx-ring { position:absolute; inset:8px; border-radius:50%; background:#F2F6FB; border:1.5px solid var(--grid); }
  .lx-letter {
    position:absolute; width:52px; height:52px; border-radius:50%; background:var(--card);
    border:2px solid var(--grid); display:flex; align-items:center; justify-content:center;
    font-family:ui-monospace,monospace; font-weight:700; font-size:24px; color:var(--ink);
    text-transform:uppercase; transform:translate(-50%,-50%); transition:background .1s,border .1s;
  }
  .lx-letter.sel { background:var(--marker); border-color:var(--marker); color:#fff; }
  #lx-svg { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  .lx-tools { display:flex; gap:6px; justify-content:center; margin-top:6px; }
  .lx-tools button {
    padding:8px 14px; border-radius:11px; border:1px solid var(--grid); background:var(--card);
    font-family:inherit; font-weight:600; font-size:13px; cursor:pointer; color:var(--ink);
  }
  /* result modal */
  #overlay {
    position:fixed; inset:0; z-index:500; background:rgba(22,50,79,.5);
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  #overlay.show { display:flex; animation:fadeIn .2s ease-out; }
  #modal {
    background:var(--card); border-radius:20px; width:100%; max-width:340px;
    padding:18px; text-align:center; box-shadow:0 16px 48px rgba(22,50,79,.35);
  }
  #modal.win { border:2px solid var(--win); animation:bounceIn .6s cubic-bezier(.34,1.56,.64,1); }
  #modal.fail { border:2px solid var(--bad); animation:popIn .25s ease-out; }
  #m-title { font-weight:700; font-size:26px; }
  #modal.win #m-title { color:var(--win); animation:titlePulse 1.1s ease-in-out 2; }
  #modal.fail #m-title { color:var(--bad); font-size:20px; }
  #m-title .wig { display:inline-block; animation:wiggle .8s ease-in-out 3; }
  #m-line { font-family:ui-monospace,monospace; font-size:13px; margin:6px 0 10px; }
  #m-share {
    background:var(--paper); border-radius:10px; padding:10px; font-family:ui-monospace,monospace;
    font-size:12px; text-align:left; white-space:pre-wrap; margin:0;
  }
  #m-close { margin-top:8px; width:100%; padding:10px; border:none; background:transparent; color:var(--faded); font-weight:600; font-family:inherit; font-size:13px; cursor:pointer; }
  .slimbar {
    margin-top:14px; background:var(--card); border-radius:14px; padding:10px 14px;
    display:flex; align-items:center; gap:10px;
  }
  .slimbar.win { border:1.5px solid var(--win); } .slimbar.fail { border:1.5px solid var(--bad); }
  .slimbar span { font-weight:700; font-size:15px; flex:1; }
  .slimbar.win span { color:var(--win); } .slimbar.fail span { color:var(--bad); }
  .slimbar button { padding:8px 14px; border:none; border-radius:12px; background:var(--ink); color:#fff; font-weight:600; font-family:inherit; cursor:pointer; }
  .hide { display:none!important; }
  /* confetti */
  .cf { position:fixed; top:-4vh; z-index:999; pointer-events:none; animation:confettiFall var(--d) var(--dl) cubic-bezier(.2,.6,.4,1) forwards; }
  @keyframes confettiFall { 0%{transform:translate(0,0) rotate(0)} 85%{opacity:1} 100%{transform:translate(var(--x),112vh) rotate(var(--r)); opacity:0} }
  @keyframes popIn { from{transform:scale(.92);opacity:0} to{transform:scale(1);opacity:1} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes bounceIn { 0%{transform:scale(.5);opacity:0} 60%{transform:scale(1.06);opacity:1} 80%{transform:scale(.98)} 100%{transform:scale(1)} }
  @keyframes titlePulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  @keyframes wiggle { 0%,100%{transform:rotate(-12deg)} 50%{transform:rotate(14deg)} }
  @media (prefers-reduced-motion:reduce){ *{animation:none!important;transition:none!important;} }
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="logo">DAYBATCH<b>.</b></div>
    <div class="ver">V13 · 5 GAMES</div>
  </div>
  <div class="tabs">
    <button data-tab="tally">🧮 Tally</button>
    <button data-tab="crossing">🧭 Cross</button>
    <button data-tab="sonar" class="on">📡 Sonar</button>
    <button data-tab="codebreak">🔐 Code</button>
    <button data-tab="lexi">🔤 Lexi</button>
  </div>
  <div id="pane-tally" class="hide"></div>
  <div id="pane-crossing" class="hide"></div>
  <div id="pane-sonar"></div>
  <div id="pane-codebreak" class="hide"></div>
  <div id="pane-lexi" class="hide"></div>
</div>

<div id="helpov">
  <div id="helpbox">
    <div id="h-title">How to play</div>
    <div id="h-body"></div>
    <button class="btn pri" style="width:100%;margin-top:12px" id="h-close">Got it</button>
  </div>
</div>

<div id="overlay">
  <div id="modal">
    <div id="m-title"></div>
    <div id="m-line"></div>
    <pre id="m-share"></pre>
    <div class="btnrow">
      <button class="btn pri" id="m-copy">Share</button>
      <button class="btn" id="m-again">Play another</button>
    </div>
    <button id="m-close">View board</button>
  </div>
</div>

<script>
"use strict";
// ---------- utils ----------
function mulberry32(seed){let a=seed>>>0;return function(){a|=0;a=(a+0x6D2B79F5)|0;let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
function hashString(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function dailySeed(g){const d=new Date();return hashString(g+"-"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate());}
function el(html){const t=document.createElement("template");t.innerHTML=html.trim();return t.content.firstChild;}

// ---------- result modal + confetti ----------
const overlay=document.getElementById("overlay"),modal=document.getElementById("modal");
let modalCtx=null;
function confetti(){
  const colors=["#FF6B2C","#1F9D55","#E6A817","#2E86AB","#9B5DE5","#16324F"];
  for(let i=0;i<90;i++){
    const p=document.createElement("div");p.className="cf";
    const size=6+Math.random()*7,round=Math.random()<.3;
    p.style.cssText=`left:${Math.random()*100}%;width:${size}px;height:${round?size:size*.55}px;background:${colors[i%6]};border-radius:${round?"50%":"2px"};--d:${2.2+Math.random()*1.8}s;--dl:${Math.random()*.7}s;--x:${(Math.random()-.5)*30}vw;--r:${(Math.random()-.5)*900}deg;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),4600);
  }
}
function showResult(ctx){ // {win,title,line,share,onAgain,slimHost}
  modalCtx=ctx;
  modal.className=ctx.win?"win":"fail";
  document.getElementById("m-title").innerHTML=ctx.win
    ?`<span class="wig">🎉</span> ${ctx.title} <span class="wig">🎉</span>`:ctx.title;
  document.getElementById("m-line").textContent=ctx.line;
  document.getElementById("m-share").textContent=ctx.share;
  document.getElementById("m-copy").textContent="Share";
  overlay.classList.add("show");
  if(ctx.win){confetti();try{navigator.vibrate&&navigator.vibrate([35,60,35,60,90]);}catch(e){}}
  // slim reopen bar under the game
  if(ctx.slimHost){
    ctx.slimHost.innerHTML="";
    const bar=el(`<div class="slimbar ${ctx.win?"win":"fail"}"><span>${ctx.win?"🎉":"💥"} ${ctx.title}</span><button>Result</button></div>`);
    bar.querySelector("button").onclick=()=>{overlay.classList.add("show");};
    ctx.slimHost.appendChild(bar);
  }
}
document.getElementById("m-close").onclick=()=>overlay.classList.remove("show");
overlay.onclick=(e)=>{if(e.target===overlay)overlay.classList.remove("show");};
document.getElementById("m-copy").onclick=async()=>{
  try{await navigator.clipboard.writeText(modalCtx.share);document.getElementById("m-copy").textContent="Copied ✓";
  setTimeout(()=>{document.getElementById("m-copy").textContent="Share";},1600);}catch(e){}
};
document.getElementById("m-again").onclick=()=>{overlay.classList.remove("show");modalCtx&&modalCtx.onAgain();};

// ---------- help ----------
const helpov=document.getElementById("helpov");
function showHelp(html){document.getElementById("h-body").innerHTML=html;helpov.classList.add("show");}
document.getElementById("h-close").onclick=()=>helpov.classList.remove("show");
helpov.onclick=(e)=>{if(e.target===helpov)helpov.classList.remove("show");};

// ---------- tabs + lazy init (heavy generators must not block first paint) ----------
const INIT={},DONE={};
function ensureInit(t){ if(!DONE[t]&&INIT[t]){ DONE[t]=1; try{INIT[t]();}catch(e){} } }
document.querySelectorAll(".tabs button").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".tabs button").forEach(x=>x.classList.toggle("on",x===b));
    ["tally","crossing","sonar","codebreak","lexi"].forEach(t=>{
      document.getElementById("pane-"+t).classList.toggle("hide",t!==b.dataset.tab);
    });
    ensureInit(b.dataset.tab);
  };
});

// ============ CROSSING ============
(function(){
  const ROWS=7,COLS=5,pane=document.getElementById("pane-crossing");
  let puz,pos,seen,boomed,lives,steps,status,seed,isDaily;
  function gen(sd){
    const rng=mulberry32(sd);
    const cStart=1+Math.floor(rng()*(COLS-2));
    const key=(r,c)=>r*COLS+c;
    let r=0,c=cStart;
    const visited=new Set([key(r,c)]),pathSet=new Set([key(r,c)]);
    while(r<ROWS-1){
      const opts=[];
      if(rng()<.55)opts.push([r+1,c]);
      if(c>0&&!visited.has(key(r,c-1)))opts.push([r,c-1]);
      if(c<COLS-1&&!visited.has(key(r,c+1)))opts.push([r,c+1]);
      const pick=opts.length?opts[Math.floor(rng()*opts.length)]:[r+1,c];
      r=pick[0];c=pick[1];visited.add(key(r,c));pathSet.add(key(r,c));
    }
    const traps=new Set();
    for(let i=0;i<ROWS*COLS;i++)if(!pathSet.has(i)&&rng()<.34)traps.add(i);
    const clues=[];
    for(let i=0;i<ROWS*COLS;i++){
      const rr=Math.floor(i/COLS),cc=i%COLS;let n=0;
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
        if(!dr&&!dc)continue;
        const ar=rr+dr,ac=cc+dc;
        if(ar>=0&&ar<ROWS&&ac>=0&&ac<COLS&&traps.has(ar*COLS+ac))n++;
      }
      clues.push(n);
    }
    return{traps,clues,start:cStart};
  }

    <div class="legend">

        <div class="mini">

          <span></span><span></span><span></span>

          <span></span><span style="background:var(--markerSoft);color:var(--marker);font-weight:700">↓</span><span></span>

    <div style="margin-top:8px">A <b>·</b> means zero traps nearby — it opens its neighbours for free. Stepping on a trap costs a life but you stay put.</div>`;
  function cascade(idx){

(function(){

  let puz,revealed,status,isDaily;
  function tryGen(sd){
    const rng=mulberry32(sd);
    for(let attempt=0;attempt<200;attempt++){
      const occ=new Set(),blocked=new Set();let ok=true;
      for(const len of SHIPS){
        let placed=false;
        for(let t=0;t<80&&!placed;t++){
          const horiz=rng()<.5;
          const r=Math.floor(rng()*(horiz?SN:SN-len+1));
          const c=Math.floor(rng()*(horiz?SN-len+1:SN));
          const cells=[];
          for(let k=0;k<len;k++)cells.push((r+(horiz?0:k))*SN+(c+(horiz?k:0)));
          if(cells.some(i=>blocked.has(i)))continue;
          cells.forEach(i=>{
            occ.add(i);
            const rr=Math.floor(i/SN),cc=i%SN;
            for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
              const ar=rr+dr,ac=cc+dc;
              if(ar>=0&&ar<SN&&ac>=0&&ac<SN)blocked.add(ar*SN+ac);
            }
          });
          placed=true;
        }
        if(!placed){ok=false;break;}
      }
      if(!ok)continue;
      const rowCounts=[],colCounts=[];
      for(let r=0;r<SN;r++)rowCounts.push([...occ].filter(i=>Math.floor(i/SN)===r).length);
      for(let c=0;c<SN;c++)colCounts.push([...occ].filter(i=>i%SN===c).length);
      return{occ,rowCounts,colCounts,total:7};
    }
    return null;
  }
  function gen(sd){
    for(let k=0;k<1000;k++){const p=tryGen((sd+k*104729)>>>0);if(p)return p;}
    const occ=new Set([0,1,2,3*SN+5,4*SN+5,6*SN+0,6*SN+1]);
    const rowCounts=[],colCounts=[];
    for(let r=0;r<SN;r++)rowCounts.push([...occ].filter(i=>Math.floor(i/SN)===r).length);
    for(let c=0;c<SN;c++)colCounts.push([...occ].filter(i=>i%SN===c).length);
    return{occ,rowCounts,colCounts,total:7};
  }

    render();
  }
  function finish(){
    const p=revealed.size;
    const label=p===puz.total?"Perfect! 🏆":p<=puz.total+2?"Sharp shooting!":p<=puz.total+5?"Solid sweep":"All found";
    const share="DAYBATCH · SONAR 📡 "+label+"\n"+p+" pings";
    showResult({win:true,title:label,line:p+" pings",
      share,onAgain:()=>load(Math.floor(Math.random()*1e9),false),
      slimHost:pane.querySelector(".slimhost")});
  }
  function render(){
    const rowHits=Array(SN).fill(0),colHits=Array(SN).fill(0);
    revealed.forEach((v,i)=>{if(v==="hit"){rowHits[Math.floor(i/SN)]++;colHits[i%SN]++;}});
    let grid=`<div class="sn-row"><div></div>${puz.colCounts.map((n,c)=>{
      const done=colHits[c]>=n;

    for(let r=0;r<SN;r++){
      const rDone=rowHits[r]>=puz.rowCounts[r];
      grid+=`<div class="sn-row"><div class="sn-edge${rDone?" done":""}">${rDone?"✓":puz.rowCounts[r]}</div>`;
      for(let c=0;c<SN;c++){
        const i=r*SN+c,st=revealed.get(i);

        grid+=`<button data-i="${i}" class="${st==="hit"?"hit":st==="miss"?"miss":showShip?"ship":""}">${st==="hit"?"◉":st==="miss"?"·":""}</button>`;
      }
      grid+="</div>";
    }
    pane.innerHTML=`
      <div class="stats">
        <button class="helpbtn" id="sn-help">?</button>
        <div class="stat big"><div class="lb">PINGS</div><div class="vl" style="color:var(--marker)">${revealed.size}</div></div>
        <div class="stat big"><div class="lb">FOUND</div><div class="vl" style="color:var(--win)">${hits()}/${puz.total}</div></div>
        <div class="stat"><div class="lb">MODE</div><div class="vl" style="color:var(--faded)">${isDaily?"DAILY":"PRAC"}</div></div>

(function(){
  const SYMS=[["tri","#E4572E"],["cir","#2E86FF"],["sq","#0FB360"],["dia","#8B5CF6"],["star","#F5A800"],["pen","#E5484D"],["plus","#0FA3A3"]];
  const LEN=5,MAXG=8,pane=document.getElementById("pane-codebreak");
  let code,guesses,current,status,isDaily;
  function gen(sd){
    const rng=mulberry32(sd);
    const idx=[0,1,2,3,4,5,6];
    for(let i=idx.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));const t=idx[i];idx[i]=idx[j];idx[j]=t;}
    return idx.slice(0,LEN);
  }
  function slotState(g,i){
    if(g[i]===code[i])return"green";
    if(code.indexOf(g[i])>=0)return"amber";
    return"grey";
  }
  const BG={green:"var(--win)",amber:"var(--amber)",grey:"#CBD5E1"};
  const EMO={green:"🟩",amber:"🟨",grey:"⬜"};

  function load(sd,daily){isDaily=daily;code=gen(sd);guesses=[];current=[];status="play";render();}
  function submit(){
    if(current.length!==LEN||status!=="play")return;
    guesses.push(current.slice());
    const solved=current.every((s,i)=>s===code[i]);
    current=[];
    if(solved){status="win";render();finish();return;}
    if(guesses.length>=MAXG){status="fail";render();finish();return;}
    render();
  }
  function finish(){
    const g=guesses.length;
    const label=status!=="win"?"Locked out":g<=2?"Mastermind! 🧠":g<=4?"Cracked it!":g<=6?"Solid solve":"Close call!";
    const share="DAYBATCH · CODEBREAK 🔐 "+label+" "+(status==="win"?g:"X")+"/"+MAXG+"\n"+
      guesses.map(gu=>gu.map((_,i)=>EMO[slotState(gu,i)]).join("")).join("\n");
    showResult({win:status==="win",title:label,
      line:status==="win"?"Solved in "+g+" of "+MAXG:"Out of guesses",
      share,onAgain:()=>load(Math.floor(Math.random()*1e9),false),
      slimHost:pane.querySelector(".slimhost")});
  }
  function symbolKnown(si){
    let best=null;
    for(const g of guesses)for(let i=0;i<LEN;i++){
      if(g[i]!==si)continue;

      }</div></div>`;

    let inputRow="";
    if(status==="play"){
      inputRow=`<div class="cb-row"><span class="cb-num" style="color:var(--marker)">➤</span><div class="cb-tiles">${
        Array.from({length:LEN},(_,i)=>current[i]!==undefined
          ?`<span class="cb-slot filled" data-slot="${i}" style="padding:4px"><i class="shp ${SYMS[current[i]][0]}" style="background:${SYMS[current[i]][1]}"></i></span>`
          :`<span class="cb-slot" data-slot="${i}"></span>`).join("")
      }</div></div>`;
    }else{
      inputRow=`<div style="margin-top:8px;font-size:13px;color:var(--faded)">Code was: ${
        code.map(s=>`<i class="shp ${SYMS[s][0]}" style="background:${SYMS[s][1]};width:22px;height:22px;display:inline-block;margin-right:6px;vertical-align:middle"></i>`).join("")}</div>`;
    }

      keys=`<div class="cb-keys">${SYMS.map((s,i)=>{
        const used=current.indexOf(i)>=0,known=symbolKnown(i),dead=known==="grey";
        const cls=[used?"used":"",dead?"dead":"",known==="green"?"kgreen":known==="amber"?"kamber":""].join(" ");
        return`<button data-k="${i}" class="${cls}" ${used||current.length>=LEN?"disabled":""}><i class="shp ${s[0]}" style="background:${s[1]}"></i><em class="kdot"></em></button>`;
      }).join("")}</div>
      <div class="btnrow">
        <button class="btn" id="cb-del">⌫ Delete</button>
        <button class="btn pri" id="cb-sub" ${current.length!==LEN?"disabled":""}>Submit guess</button>

    pane.querySelector("#cb-today").onclick=()=>load(dailySeed("codebreak"),true);
  }
  INIT.codebreak=()=>load(dailySeed("codebreak"),true);

// ============ TALLY ============
(function(){
  const SIZE=5,N=25,START=0,END=24,pane=document.getElementById("pane-tally");
  let puz,path,attempts,status,isDaily,dragging=false;
  let elGrid,elSvg,elTotal,elTries,boardEl;

  function neighbors(i){
    const r=Math.floor(i/SIZE),c=i%SIZE,out=[];
    if(r>0)out.push(i-SIZE); if(r<SIZE-1)out.push(i+SIZE);
    if(c>0)out.push(i-1); if(c<SIZE-1)out.push(i+1);
    return out;
  }
  function applyOp(t,op,n){return op==="+"?t+n:op==="−"?t-n:t*n;}
  function genCells(rng){
    const cells=[];
    for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
      if((r+c)%2===0)cells.push({type:"num",value:1+Math.floor(rng()*9)});
      else{const roll=rng();cells.push({type:"op",value:roll<.45?"+":roll<.8?"−":"×"});}
    }
    return cells;
  }
  function solveGrid(cells){
    const results=new Map(),visited=new Array(N).fill(false);
    let iter=0;const MAXI=90000,MAXL=13;
    function dfs(pos,len,total,pending){
      if(iter++>MAXI)return;
      if(pos===END){
        const e=results.get(total)||{count:0,minLen:99};
        e.count++;e.minLen=Math.min(e.minLen,len);results.set(total,e);return;
      }
      if(len>=MAXL)return;
      for(const nb of neighbors(pos)){
        if(visited[nb])continue;
        const cell=cells[nb];visited[nb]=true;
        if(cell.type==="op")dfs(nb,len+1,total,cell.value);
        else dfs(nb,len+1,applyOp(total,pending,cell.value),null);
        visited[nb]=false;
      }
    }
    visited[START]=true;
    dfs(START,1,cells[START].value,null);
    return results;
  }
  function gen(seed){
    for(let a=0;a<14;a++){
      const rng=mulberry32((seed+a*7919)>>>0);
      const cells=genCells(rng);
      const sols=solveGrid(cells);
      let cand=[...sols.entries()].filter(([t,e])=>e.count>=3&&e.minLen>=7&&e.minLen<=11&&t>0&&t<=99);
      if(!cand.length)cand=[...sols.entries()].filter(([t,e])=>e.count>=2&&e.minLen>=5&&t>0&&t<=150);
      if(!cand.length)continue;
      cand.sort((x,y)=>Math.abs(x[1].minLen-9)-Math.abs(y[1].minLen-9));
      const pool=cand.slice(0,Math.min(6,cand.length));
      const pick=pool[Math.floor(rng()*pool.length)];
      return{cells:cells,target:pick[0],par:pick[1].minLen};
    }
    return null;
  }
  function evalPath(){
    if(!path.length)return{total:null,pending:false};
    let total=puz.cells[path[0]].value,pending=false;
    for(let i=1;i<path.length;i+=2){
      if(i+1<path.length)total=applyOp(total,puz.cells[path[i]].value,puz.cells[path[i+1]].value);
      else pending=true;
    }
    return{total,pending};
  }
  const TY_HELP=`<b>Drag a path</b> from START to END through numbers and operators. Your total runs left to right as you draw — land on END with <b>exactly the target</b>.<br><br><b>BEST</b> is the shortest possible winning path — match it for a perfect ⛳.<br><br>Retrace your line to undo. You can also tap an adjacent cell to extend. Unlimited tries, but they're counted.`;
  function load(seed,daily){
    isDaily=daily;
    puz=gen(seed);
    if(!puz){puz=gen(Math.floor(Math.random()*1e9));}
    path=[START];attempts=0;status="play";buildDOM();
  }
  function buildDOM(){
    let cells="";
    for(let i=0;i<N;i++){
      const c=puz.cells[i];
      let tag="";
      if(i===START)tag='<span class="tag">START</span>';
      if(i===END)tag='<span class="tag">END</span>';
      cells+=`<div class="tc ${c.type}" data-i="${i}">${c.value}${tag}</div>`;
    }
    pane.innerHTML=`
      <div class="stats">
        <button class="helpbtn" id="ty-help">?</button>
        <div class="stat big"><div class="lb">TARGET</div><div class="vl" style="color:var(--marker)">${puz.target}</div></div>
        <div class="stat big"><div class="lb">RUNNING</div><div class="vl" id="ty-total">—</div></div>
        <div class="stat"><div class="lb">BEST</div><div class="vl">${puz.par}</div></div>
        <div class="stat"><div class="lb">TRIES</div><div class="vl" id="ty-tries">0</div></div>
      </div>
      <div class="board" id="ty-board">
        <div id="ty-grid">${cells}</div>
        <svg id="ty-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
          <polyline id="ty-line" points="" fill="none" stroke="var(--marker)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity=".3"/>
          <circle id="ty-tip" r="2.6" fill="var(--marker)" opacity=".85"/>
        </svg>
      </div>
      <div class="btnrow">
        <button class="btn" id="ty-clear">Clear path</button>
        <button class="btn" id="ty-new">New puzzle</button>
        <button class="btn pri" id="ty-today">Today's</button>
      </div>
      <div class="slimhost"></div>`;
    boardEl=pane.querySelector("#ty-board");
    elGrid=pane.querySelector("#ty-grid");
    elTotal=pane.querySelector("#ty-total");
    elTries=pane.querySelector("#ty-tries");
    pane.querySelector("#ty-help").onclick=()=>showHelp(TY_HELP);
    pane.querySelector("#ty-clear").onclick=()=>{path=[START];updatePath();};
    pane.querySelector("#ty-new").onclick=()=>load(Math.floor(Math.random()*1e9),false);
    pane.querySelector("#ty-today").onclick=()=>load(dailySeed("tally"),true);
    boardEl.addEventListener("touchmove",e=>e.preventDefault(),{passive:false});
    boardEl.addEventListener("pointerdown",onDown);
    boardEl.addEventListener("pointermove",onMove);
    boardEl.addEventListener("pointerup",onUp);
    boardEl.addEventListener("pointercancel",onUp);
    updatePath();
  }
  function cellFromPoint(x,y){
    const rect=elGrid.getBoundingClientRect();
    const px=x-rect.left,py=y-rect.top;
    if(px<0||py<0||px>=rect.width||py>=rect.height)return-1;
    const cw=rect.width/SIZE,ch=rect.height/SIZE;
    const c=Math.floor(px/cw),r=Math.floor(py/ch);
    const fx=(px-c*cw)/cw,fy=(py-r*ch)/ch;
    if(fx<.14||fx>.86||fy<.14||fy>.86)return-1;
    return r*SIZE+c;
  }
  function tryExtend(i){
    if(i<0||status!=="play")return;
    const last=path[path.length-1];
    if(i===last)return;
    if(path.length>=2&&i===path[path.length-2]){path.pop();updatePath();return;}
    if(last===END)return;
    if(path.indexOf(i)>=0)return;
    if(neighbors(last).indexOf(i)<0)return;
    path.push(i);updatePath();
  }
  function onDown(e){
    if(status!=="play")return;
    try{boardEl.setPointerCapture(e.pointerId);}catch(err){}
    const i=cellFromPoint(e.clientX,e.clientY);
    if(i===START&&path.length>1){path=[START];updatePath();dragging=true;return;}
    if(i===path[path.length-1]||i===START){dragging=true;return;}
    tryExtend(i);dragging=true;
  }
  function onMove(e){
    if(!dragging||status!=="play")return;
    e.preventDefault();
    tryExtend(cellFromPoint(e.clientX,e.clientY));
  }
  function onUp(){
    if(!dragging)return;
    dragging=false;
    if(status!=="play")return;
    if(path[path.length-1]===END){
      attempts++;elTries.textContent=attempts;
      const t=evalPath().total;
      if(t===puz.target){status="win";updatePath();finish();}
      else{boardEl.classList.remove("shakeX");void boardEl.offsetWidth;boardEl.classList.add("shakeX");}
    }
  }
  function centre(i){
    const r=Math.floor(i/SIZE),c=i%SIZE,p=100/SIZE;
    return[c*p+p/2,r*p+p/2];
  }
  function updatePath(){
    elGrid.querySelectorAll(".tc").forEach(d=>d.classList.toggle("on",path.indexOf(+d.dataset.i)>=0));
    const pts=path.map(i=>centre(i).join(",")).join(" ");
    pane.querySelector("#ty-line").setAttribute("points",path.length>1?pts:"");
    const tip=centre(path[path.length-1]);
    const tipEl=pane.querySelector("#ty-tip");
    tipEl.setAttribute("cx",tip[0]);tipEl.setAttribute("cy",tip[1]);
    const ev=evalPath();
    elTotal.textContent=ev.total===null?"—":ev.total;
    const atEnd=path[path.length-1]===END;
    elTotal.style.color=status==="win"?"var(--win)":atEnd&&ev.total!==puz.target?"var(--bad)":ev.pending?"var(--faded)":"var(--ink)";
    if(status==="win"){
      pane.querySelector("#ty-line").setAttribute("stroke","var(--win)");
      tipEl.setAttribute("fill","var(--win)");
    }
  }
  function finish(){
    const moves=path.length;
    const label=moves<=puz.par&&attempts===1?"Perfect! ⛳":moves<=puz.par?"Best path! ⛳":"Solved!";
    const share="DAYBATCH · TALLY 🧮 "+label+" 🎯 "+puz.target+"\nPath "+moves+" · Best "+puz.par+(moves<=puz.par?" ⛳":" (+"+(moves-puz.par)+")")+"\nTries: "+attempts;
    showResult({win:true,title:label,
      line:"Path "+moves+" · Best "+puz.par+" · Tries "+attempts,share,
      onAgain:()=>load(Math.floor(Math.random()*1e9),false),
      slimHost:pane.querySelector(".slimhost")});
  }
  INIT.tally=()=>load(dailySeed("tally"),true);
})();

  const ALL=[].concat(W3,W4,W5,W6);
  function counts(w){const c={};for(const ch of w)c[ch]=(c[ch]||0)+1;return c;}
  function canForm(word,base){const b=Object.assign({},base);for(const ch of word){if(!b[ch])return false;b[ch]--;}return true;}

  function gen(sd){
    const rng=mulberry32(sd);
    const start=Math.floor(rng()*W6.length);
    for(let k=0;k<W6.length;k++){
      const seed=W6[(start+k)%W6.length];
      const base=counts(seed);
      const targets=ALL.filter(w=>w.length<=6&&canForm(w,base));
      if(targets.length>=7&&targets.length<=16){
        targets.sort((a,b)=>a.length-b.length||a.localeCompare(b));
        // shuffle wheel letters
        const letters=seed.split("");
        for(let i=letters.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));const t=letters[i];letters[i]=letters[j];letters[j]=t;}

      }
    }
    return null;
  }
  function load(sd,daily){
    isDaily=daily;puz=gen(sd);

    build();
  }
  function slotsHTML(){

  function build(){

        <div class="stat"><div class="lb">HINTS</div><div class="vl" id="lx-hints">0</div></div>

      </div>
      <div class="board" style="padding:8px 6px">
        <div class="lx-slots" id="lx-slots">${slotsHTML()}</div>
        <div id="lx-preview">&nbsp;</div>
        <div id="lx-wheelwrap">

          </svg>
          ${puz.letters.map((ch,i)=>{
            const a=-Math.PI/2+i*2*Math.PI/puz.letters.length;
            const x=115+78*Math.cos(a),y=115+78*Math.sin(a);

          }).join("")}

        <div class="lx-tools">
          <button id="lx-back">⌫</button>

    wheelEl=pane.querySelector("#lx-wheelwrap");
    elPrev=pane.querySelector("#lx-preview");
    letterEls=[...pane.querySelectorAll(".lx-letter")];
    centers=puz.letters.map((_,i)=>{
      const a=-Math.PI/2+i*2*Math.PI/puz.letters.length;
      return[115+78*Math.cos(a),115+78*Math.sin(a)];
    });
    pane.querySelector("#lx-help").onclick=()=>showHelp(LX_HELP);
    pane.querySelector("#lx-shuffle").onclick=shuffle;
    pane.querySelector("#lx-back").onclick=()=>{seq.pop();drawSeq();};

      const dx=px-centers[i][0],dy=py-centers[i][1];

    letterEls.forEach((el,i)=>el.classList.toggle("sel",seq.indexOf(i)>=0));

    elPrev.textContent=seq.length?seq.map(i=>puz.letters[i]).join(""):"\u00A0";

  }
  function onDown(e){
    if(status!=="play")return;
    try{wheelEl.setPointerCapture(e.pointerId);}catch(err){}
    dragging=true;moved=false;
    const i=letterFromPoint(e.clientX,e.clientY);
    if(i<0)return;
    const pos=seq.indexOf(i);
    if(pos<0)seq.push(i);                    // tap or swipe-start: add letter
    else if(pos===seq.length-1)seq.pop();    // tapping the last letter again = undo
    drawSeq();
  }
  function onMove(e){
    if(!dragging||status!=="play")return;
    e.preventDefault();
    const i=letterFromPoint(e.clientX,e.clientY);
    if(i<0)return;
    const pos=seq.indexOf(i);
    if(pos>=0){
      if(pos===seq.length-2){seq.pop();moved=true;drawSeq();} // retrace to undo
    }else{
      seq.push(i);moved=true;drawSeq();
    }
  }
  function onUp(){
    if(!dragging)return;
    dragging=false;
    if(status!=="play")return;
    if(moved)submitSeq();            // swipe gesture: release = submit
    // plain tap: keep building — submit via ✓ Check or a finishing swipe
  }
  function submitSeq(){
    const word=seq.map(i=>puz.letters[i]).join("");
    if(word.length>=3){
      if(puz.targets.indexOf(word)>=0&&!found.has(word)){
        found.add(word);
        refresh();
        elPrev.textContent=word;
        elPrev.style.color="var(--win)";
        checkWin();
      }else if(found.has(word)){
        elPrev.style.color="var(--faded)";
      }else{
        elPrev.style.color="var(--bad)";
        wheelEl.classList.remove("shakeX");void wheelEl.offsetWidth;wheelEl.classList.add("shakeX");
      }
    }
    seq=[];
    setTimeout(()=>{if(!dragging&&!seq.length){letterEls.forEach(el=>el.classList.remove("sel"));pane.querySelector("#lx-line").setAttribute("points","");}},350);
  }
  function refresh(){
    pane.querySelector("#lx-slots").innerHTML=slotsHTML();
    pane.querySelector("#lx-found").textContent=found.size+"/"+puz.targets.length;
    pane.querySelector("#lx-hints").textContent=hints;
  }
  function checkWin(){
    if(found.size===puz.targets.length){
      status="win";
      finish();
    }
  }
  function finish(){
    const label=hints===0?"Wordsmith! 🏆":hints<=2?"Sharp!":"Solved!";
    const share="DAYBATCH · LEXI 🔤 "+label+"\n"+puz.targets.length+" words · "+hints+" hint"+(hints===1?"":"s");
    showResult({win:true,title:label,
      line:puz.targets.length+" words · "+hints+" hint"+(hints===1?"":"s"),share,
      onAgain:()=>load(Math.floor(Math.random()*1e9),false),
      slimHost:pane.querySelector(".slimhost")});
  }
  const LX_HELP=`<b>Swipe through the letters</b> and release to submit — or <b>tap letters one by one</b> and press ✓ Check. Every word uses each wheel letter at most once.<br><br>Fill every slot above the wheel — all target words are <b>common English words</b> of 3+ letters made from today's six letters.<br><br><b>🔀 Shuffle</b> rearranges the wheel when you're stuck — it often shakes a word loose. <b>💡 Hint</b> reveals a whole word, but hints count against your rank.<br><br>Retrace your swipe to undo a letter.`;
  INIT.lexi=()=>load(dailySeed("lexi"),true);
})();
